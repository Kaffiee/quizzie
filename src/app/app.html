<main class="main">
  <div class="card">
    <h2>Input Card</h2>
    <div class="input-group">
      <label for="textInput">Enter your text:</label>
      <input
        type="text"
        id="textInput"
        placeholder="Type something..."
        [value]="inputText()"
        (input)="onInputChange($any($event.target).value)"
      />
    </div>
    @if (inputText()) {
      <div class="input-display">
        You typed: <strong>{{ inputText() }}</strong>
      </div>
    }
  </div>
</main>
